# Docker Compose configuration for Cayeshni API with PostgreSQL
name: cayeshni-backend

services:
  db:
    image: postgres:16-alpine
    restart: always
    user: postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-cayeshni}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cayeshni}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      target: final
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - keys:/app/keys
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
  keys:

