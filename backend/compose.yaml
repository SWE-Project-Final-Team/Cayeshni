# Docker Compose configuration for Cayeshni API with PostgreSQL

services:
  db:
    image: postgres:16-alpine
    restart: always
    user: postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-cayeshni}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      target: final
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-cayeshni}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:

