# Docker Compose configuration for Cayeshni API with PostgreSQL
name: cayeshni

services:
  db:
    container_name: db
    image: postgres:16-alpine
    restart: always
    user: postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DATABASE__NAME:-cayeshni}
      POSTGRES_USER: ${DATABASE__USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DATABASE__PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE__USER:-postgres} -d ${DATABASE__NAME:-cayeshni}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  server:
    container_name: server
    build:
      context: backend/
      target: final
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - keys:/app/keys
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
  frontend:
    container_name: frontend
    build:
      context: frontend/
    restart: unless-stopped
    depends_on:
      - server
    environment:
      INTERNAL_API_URL: http://server:8080
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db-data:
  keys:
  uploads:

