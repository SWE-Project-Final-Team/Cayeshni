name: PR Validation

on:
  pull_request:
    branches: [develop, main]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate branch rules
        run: |
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"

          echo "Base: $BASE"
          echo "Head: $HEAD"

          if [[ "$BASE" == "develop" ]]; then
            if [[ ! "$HEAD" =~ ^(feature|fix|chore|docs|refactor|test|hotfix)/ && "$HEAD" != "main" ]]; then
              echo "❌ Invalid branch for develop"
              exit 1
            fi
          fi

          if [[ "$BASE" == "main" ]]; then
            if [[ "$HEAD" != "develop" && ! "$HEAD" =~ ^hotfix/ ]]; then
              echo "❌ Only develop or hotfix/* can merge into main"
              exit 1
            fi
          fi

          echo "✅ Branch rules passed"

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [validate, changes]

    if: github.base_ref == 'main' || needs.changes.outputs.backend == 'true'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: cayeshni_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - working-directory: backend
        run: dotnet restore

      - working-directory: backend
        run: dotnet build --no-restore --configuration Release

      - working-directory: backend
        run: dotnet test --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=cayeshni_test;Username=testuser;Password=testpassword

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [validate, changes]

    if: github.base_ref == 'main' || needs.changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - working-directory: frontend
        run: npm ci

      - working-directory: frontend
        run: npm test -- --run

  final-status:
    name: Final Status
    runs-on: ubuntu-latest

    needs:
      - validate
      - changes
      - backend-tests
      - frontend-tests

    if: always()

    steps:
      - name: Validate overall result
        run: |
          echo "validate = ${{ needs.validate.result }}"
          echo "changes = ${{ needs.changes.result }}"
          echo "backend = ${{ needs.backend-tests.result }}"
          echo "frontend = ${{ needs.frontend-tests.result }}"

          if [[ "${{ needs.validate.result }}" != "success" ]]; then
            echo "❌ Validation failed"
            exit 1
          fi

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "❌ Change detection failed"
            exit 1
          fi

          if [[ "${{ needs.backend-tests.result }}" != "success" && "${{ needs.backend-tests.result }}" != "skipped" ]]; then
            echo "❌ Backend tests failed"
            exit 1
          fi

          if [[ "${{ needs.frontend-tests.result }}" != "success" && "${{ needs.frontend-tests.result }}" != "skipped" ]]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi

          echo "✅ All checks passed"