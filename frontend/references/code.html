<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cayeshni - Login &amp; Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Manrope:wght@600;700&amp;display=swap" rel="stylesheet"/>

                        "surface-container-lowest": "#ffffff",

                    "spacing": {

                        "base": "4px",
                        "xl": "32px",

                        "3xl": "64px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],

                        "body-md": ["Inter"]

                    "fontSize": {

                        "financial-xl": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],

                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]

                    "boxShadow": {
                        "level-1": "0 2px 8px rgba(26, 43, 60, 0.05)",
                        "level-2": "0 8px 24px rgba(26, 43, 60, 0.08)",
                        "halo": "0 0 0 2px rgba(4, 83, 205, 0.2)"
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Hidden radio logic for tabs/flow */
        #tab-login:checked ~ #content-login { display: block; }
        #tab-login:checked ~ #content-signup { display: none; }
        #tab-signup:checked ~ #content-signup { display: block; }
        #tab-signup:checked ~ #content-login { display: none; }

        #tab-login:checked ~ .tab-controls label[for="tab-login"] {
            border-bottom-color: theme('colors.secondary');
            color: theme('colors.primary');
        }
        #tab-signup:checked ~ .tab-controls label[for="tab-signup"] {
            border-bottom-color: theme('colors.secondary');
            color: theme('colors.primary');
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md md:p-xl font-body-md antialiased">
<!-- Main Container -->
<main class="w-full max-w-[1000px] bg-surface-container-lowest rounded-[24px] shadow-level-2 border border-outline-variant/30 flex flex-col md:flex-row overflow-hidden relative">
<!-- Left Side: Branding / Abstract Visual -->
<div class="hidden md:flex flex-col justify-between w-5/12 bg-surface-container p-xl relative overflow-hidden" data-alt="A modern, abstract digital artwork representing financial connectivity and stability. Soft, glowing nodes connect via elegant sweeping lines against a very light, minimalist background (whites, light grays). Subtle accents of deep navy blue and bright trust blue highlight the connections. The lighting is bright and corporate, conveying trust and transparency." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBe2qAQ1o7B5ptUYohvGZreyVeRTDJsbI_r6lCGUyKBjABCxykkAlV-Ol4eAfCrGpa1UprlupIhP4xCv5d0zSmotVMNTtVpqbkaCPMk1-7kQy3hgF1W7b8MgjeoSfPHoMDwJRvbSvsuF_ecEhmUD7aeEdIK8TbPe8zkL_G2tQS4tTMLokuEGlB9MD-tyPHvmMBlTGGzbILG23j45dlS82TZGFAMYyq7ZT7QNZteEwmZTxFUlFWmwedUWx60lqflfKcHZEKoNwq_LhQ'); background-size: cover; background-position: center;">
<!-- Overlay to ensure text readability if image is dark/busy, though prompt specifies light -->
<div class="absolute inset-0 bg-surface/40 backdrop-blur-[2px]"></div>
<div class="relative z-10">
<h1 class="font-display-lg text-display-lg text-primary flex items-center gap-sm">
<span class="material-symbols-outlined fill text-[40px] text-secondary">payments</span>
                    Cayeshni
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-sm">Clarity in shared finances.</p>
</div>
<div class="relative z-10 bg-surface/80 backdrop-blur-md p-md rounded-2xl border border-outline-variant/50 shadow-level-1">
<div class="flex items-center gap-sm mb-sm">
<span class="material-symbols-outlined text-secondary fill">verified_user</span>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider">Bank-Grade Security</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">Your data is encrypted and secure. We focus on transparency so you can focus on collaboration.</p>
</div>
</div>
<!-- Right Side: Forms (Login / Signup) -->
<div class="w-full md:w-7/12 p-lg md:p-[48px] flex flex-col justify-center relative">
<!-- Mobile Header (Hidden on Desktop) -->
<div class="md:hidden mb-xl text-center">
<h1 class="font-display-lg text-display-lg text-primary flex items-center justify-center gap-sm">
<span class="material-symbols-outlined fill text-[32px] text-secondary">payments</span>
                    Cayeshni
                </h1>
</div>
<!-- Tab System -->
<input checked="" class="hidden" id="tab-login" name="auth-tabs" type="radio"/>
<input class="hidden" id="tab-signup" name="auth-tabs" type="radio"/>
<div class="tab-controls flex mb-xl border-b border-outline-variant/30">
<label class="flex-1 text-center py-sm font-headline-md text-headline-md text-on-surface-variant border-b-2 border-transparent cursor-pointer transition-colors hover:text-primary" for="tab-login">
                    Sign In
                </label>
<label class="flex-1 text-center py-sm font-headline-md text-headline-md text-on-surface-variant border-b-2 border-transparent cursor-pointer transition-colors hover:text-primary" for="tab-signup">
                    Create Account
                </label>
</div>
<!-- LOGIN CONTENT -->
<div class="space-y-xl animate-fade-in" id="content-login">
<form class="space-y-md">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs">Email Address</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all" placeholder="you@example.com" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-xs">
<label class="block font-label-sm text-label-sm text-on-surface-variant">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:underline" href="#">Forgot?</a>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-secondary text-on-secondary font-label-sm text-label-sm py-md rounded-lg shadow-sm hover:shadow-md hover:bg-secondary/90 transition-all flex justify-center items-center gap-sm" type="button">
                        Sign In
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink-0 mx-md text-on-surface-variant font-label-sm text-label-sm uppercase tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm py-sm px-md border border-outline-variant rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-colors text-primary font-label-sm text-label-sm">
<svg class="w-5 h-5" viewbox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
                        Google
                    </button>
<button class="flex items-center justify-center gap-sm py-sm px-md border border-outline-variant rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-colors text-primary font-label-sm text-label-sm">
<svg class="w-5 h-5" viewbox="0 0 23 23"><path d="M0 0h23v23H0z" fill="#f3f3f3"></path><path d="M1 1h10v10H1z" fill="#f35325"></path><path d="M12 1h10v10H12z" fill="#81bc06"></path><path d="M1 12h10v10H1z" fill="#05a6f0"></path><path d="M12 12h10v10H12z" fill="#ffba08"></path></svg>
                        Microsoft
                    </button>
</div>
</div>
<!-- SIGNUP & ONBOARDING CONTENT -->
<div class="space-y-xl hidden animate-fade-in" id="content-signup">
<!-- Mocking a multi-step flow using details/summary for simplicity in static HTML without JS -->
<div class="space-y-lg">
<!-- Step 1: Account Details -->
<div class="bg-surface-container-low p-md rounded-2xl border border-outline-variant/30">
<h3 class="font-headline-md text-headline-md text-primary mb-md flex items-center gap-sm">
<span class="flex items-center justify-center w-6 h-6 rounded-full bg-secondary text-on-secondary text-[12px] font-bold">1</span>
                            Account Setup
                        </h3>
<div class="space-y-md">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs">Email Address</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all" placeholder="you@example.com" type="email"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs">Password</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all" placeholder="Create a strong password" type="password"/>
</div>
</div>
</div>
<!-- Step 2: Profile (AspNetUsers Custom Fields) -->
<div class="bg-surface-container-low p-md rounded-2xl border border-outline-variant/30 opacity-70 hover:opacity-100 transition-opacity">
<h3 class="font-headline-md text-headline-md text-primary mb-md flex items-center gap-sm">
<span class="flex items-center justify-center w-6 h-6 rounded-full border-2 border-outline-variant text-outline-variant text-[12px] font-bold">2</span>
                            Profile &amp; Preferences
                        </h3>
<div class="space-y-md">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs">Display Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all" placeholder="How should we call you?" type="text"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs">Default Currency</label>
<select class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all appearance-none">
<option value="USD">USD ($) - US Dollar</option>
<option value="EUR">EUR (€) - Euro</option>
<option value="GBP">GBP (£) - British Pound</option>
</select>
</div>
</div>
</div>
<!-- Step 3: Action -->
<div class="bg-surface-container-low p-md rounded-2xl border border-outline-variant/30 opacity-70 hover:opacity-100 transition-opacity">
<h3 class="font-headline-md text-headline-md text-primary mb-md flex items-center gap-sm">
<span class="flex items-center justify-center w-6 h-6 rounded-full border-2 border-outline-variant text-outline-variant text-[12px] font-bold">3</span>
                            Get Started
                        </h3>
<div class="grid grid-cols-1 gap-md">
<button class="w-full bg-surface-container-lowest border border-secondary text-primary font-label-sm text-label-sm py-md rounded-lg shadow-sm hover:bg-surface-container-low transition-all flex justify-center items-center gap-sm" type="button">
<span class="material-symbols-outlined text-[18px]">group_add</span>
                                Create a New Group
                            </button>
<button class="w-full bg-secondary text-on-secondary font-label-sm text-label-sm py-md rounded-lg shadow-sm hover:bg-secondary/90 transition-all flex justify-center items-center gap-sm" type="button">
<span class="material-symbols-outlined text-[18px]">login</span>
                                Join Existing Group
                            </button>
</div>
</div>
</div>
</div>
</div>
</main>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</body></html>
